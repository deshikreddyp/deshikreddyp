<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Notes - Deshik Reddy Putluru</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border-color: #334155;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .notes-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .notes-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .notes-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .notes-header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        /* Search & Filter Section */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .search-wrapper {
            position: relative;
        }

        #note-search {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        #note-search:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .search-wrapper::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .tags-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-pill {
            padding: 6px 14px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag-pill:hover, .tag-pill.active {
            background: var(--accent-color);
            color: var(--primary-bg);
            border-color: var(--accent-color);
            font-weight: 600;
        }

        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px 20px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
        }

        th:hover {
            color: var(--accent-color);
        }

        th.sort-asc::after { content: " ↑"; }
        th.sort-desc::after { content: " ↓"; }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(56, 189, 248, 0.05);
        }

        .note-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            display: block;
            margin-bottom: 4px;
        }

        .note-link:hover {
            text-decoration: underline;
        }

        .cat-text {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .row-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .row-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            border-radius: 4px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .date-col {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* Empty state */
        .no-results {
            padding: 40px;
            text-align: center;
            color: var(--text-dim);
            display: none;
        }

        @media (max-width: 768px) {
            .notes-header h1 { font-size: 2.2rem; }
            th:nth-child(3), td:nth-child(3) { display: none; } /* Hide tags on mobile */
            .date-col { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

        <div class="table-wrapper">

            <div id="no-results" class="no-results">
